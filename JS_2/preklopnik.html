<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Switch</title>
</head>
<body>
<script>
  let hr = new Date().getHours();
  switch(hr){
    case 0:
        document.write("<br /> It is Midnight!");
        break;
    case 12:
      document.write("<br /> It is Noon!");
      break;
      default:
        document.write("<br /> Now is: " + hr);
  }
</script>
</body>
</html>
