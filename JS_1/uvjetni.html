<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> IF clauses</title>
</head>
<body>
<script>
  let num1 = 25;
  let num2 = 100;
  let bvar = false;

  if(num2 % num1 == 0){
    bvar = true;
    document.writeln(num2 + " is divisible with: " + num1 + "<br>");
  }
  document.writeln(bvar);
  if(bvar){
    document.writeln("Boolean variable is - " + bvar +"<br>");
    document.writeln>("<br>" + bvar + "<br>");
  }
  let res = num1 + num2;
  document.writeln("Result is: " + res);

</script>
</body>
</html>
